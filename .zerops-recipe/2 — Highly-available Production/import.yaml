#zeropsPreprocessor=on

# Highly-available Production — a 3-node Postgres HA cluster for data durability, plus
# the Operant service on dedicated CPU. NOTE: the Operant service is single-node by
# design — its gateway process owns one Slack Socket Mode connection + OpenClaw
# session/cron state and cannot be replicated, so HA here hardens the DATA layer, not
# the app. Requires the Serious project plan (HA managed services need 3 containers).
#
# buildFromGit points at THIS recipe repo (holding zerops.yaml), not the Operant
# source repo. If you fork, update the URLs below.

project:
  name: operant
  corePackage: SERIOUS
  envVariables:
    OPERANT_INTERNAL_TOKEN: <@generateRandomString(<48>)>
    OPENCLAW_GATEWAY_TOKEN: <@generateRandomString(<48>)>
  tags:
    - operant
    - ai-agents
    - slack
    - msteams

services:
  # ---- state: 3-node HA Postgres cluster (the actual HA win of this tier) ----
  - hostname: db
    type: postgresql:ha@16
    priority: 10
    profile: oltp-staging        # HA tier; escalate to oltp-production under load

  # ---- Operant: control plane + gateway in one container ----
  # Still a singleton (gateway can't scale out), but on dedicated CPU + more headroom
  # for higher chat throughput. Scale vertically here, not horizontally.
  - hostname: operant
    type: nodejs@24
    priority: 5
    buildFromGit: https://github.com/fxck/zerops-operant
    zeropsSetup: operant
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1             # gateway process is single-owner — never scale out
    verticalAutoscaling:
      cpuMode: DEDICATED

  # ---- Docker host: docker type is fixed-resource, single VM (no HA) ----
  - hostname: dockerhost
    type: docker@26.1.5
    priority: 5
    buildFromGit: https://github.com/fxck/zerops-operant
    zeropsSetup: dockerhost
