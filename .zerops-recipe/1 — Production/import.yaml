#zeropsPreprocessor=on

# Production (single-node) — managed Postgres + the Operant service (control plane and
# OpenClaw gateway run as two processes in one container) + a sandbox Docker host.
# Cheapest way to run Operant for real; no redundancy.
#
# buildFromGit points at THIS recipe repo (holding zerops.yaml), not the Operant
# source repo. If you fork, update the URLs below.

project:
  name: operant
  corePackage: LIGHT
  # Shared secrets — the control-plane and gateway processes both read the identical
  # value, so they live at project level (inherited by every service), generated once.
  envVariables:
    OPERANT_INTERNAL_TOKEN: <@generateRandomString(<48>)>
    OPENCLAW_GATEWAY_TOKEN: <@generateRandomString(<48>)>
  tags:
    - operant
    - ai-agents
    - slack
    - msteams

services:
  # ---- state (starts first) ----
  - hostname: db
    type: postgresql:single@16   # validated on 16; 17/18 also available
    priority: 10
    profile: oltp-hobby          # conservative; escalate under load

  # ---- Operant: control plane + OpenClaw gateway in one container ----
  # Singleton: the gateway owns one Slack Socket Mode connection + OpenClaw
  # session/cron state and can't be scaled out; the control plane rides along (its
  # load is bounded by admins + that one gateway). Scale vertically, not out.
  - hostname: operant
    type: nodejs@24
    priority: 5
    buildFromGit: https://github.com/fxck/zerops-operant
    zeropsSetup: operant
    enableSubdomainAccess: true  # the control-plane subdomain is the dashboard URL
    minContainers: 1
    maxContainers: 1
    envSecrets:
      # control-plane process: DB + credential encryption. 32 ASCII chars = 32 bytes.
      OPERANT_SECRET_KEY: <@generateRandomString(<32>)>
      OPERANT_ADMIN_LOGIN_TOKEN: <@generateRandomString(<32>)>

  # ---- Docker host: isolated sandbox for agent tool calls ----
  - hostname: dockerhost
    type: docker@26.1.5
    priority: 5
    buildFromGit: https://github.com/fxck/zerops-operant
    zeropsSetup: dockerhost
