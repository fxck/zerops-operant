# Operant — Zerops recipe lifecycle (build + run per service).
#
# This repo is NOT a fork of the Operant source. The build clones a pinned revision of
# github.com/tomascupr/operant (see operant/utils/build.sh) and ships it. Source is a
# build input, never edited. Upgrade = bump OPERANT_REF in the utils/build.sh script.
#
# The control plane and the OpenClaw gateway run as TWO PROCESSES in ONE service
# (run.startCommands), so they share a filesystem: the control plane writes
# /operant/openclaw/openclaw.json and the gateway reads it from the same path — no
# cross-container config delivery needed (this is v0.6.0's shared-volume model,
# collapsed into one container). Long lifecycle logic lives in operant/utils/*.sh.

zerops:
  # ── Operant: control plane + OpenClaw gateway (two processes, one container) ─
  - setup: operant
    build:
      base: nodejs@24
      os: alpine
      prepareCommands:
        - sudo apk add --no-cache git   # needed to clone the Operant source
      buildCommands:
        # One clone builds BOTH workspace packages and packs all three OpenClaw plugins.
        - sh operant/utils/build.sh
      deployFiles:
        # The whole built clone: control-plane dist + node_modules to RUN, and
        # deploy/openclaw/* the gateway init needs. (tilde strips the src/ prefix.)
        - src/~
        - operant/utils    # → /var/www/operant/utils/run-init.sh
      addToRunPrepare:
        # Three plugin tarballs + run-prepare.sh → /home/zerops/plugins.
        - plugins
      cache:
        - .pnpm-store
    deploy:
      readinessCheck:
        httpGet:
          port: 8080
          path: /healthz
    run:
      base: nodejs@24
      os: alpine
      prepareCommands:
        - sh /home/zerops/plugins/run-prepare.sh
      initCommands:
        # Resolver wrapper, sandbox image, plugin install. NO config fetch — the
        # control-plane process writes the config to the same local /operant/openclaw.
        - sh /var/www/operant/utils/run-init.sh
      ports:
        - port: 8080      # control plane / dashboard — PUBLIC (this subdomain is the dashboard URL)
          httpSupport: true
        - port: 18789     # OpenClaw gateway API — INTERNAL only. httpSupport:false = private
          httpSupport: false   # network (no public subdomain); control plane reaches it at operant:18789
        - port: 3978      # Teams webhook — PUBLIC only for Microsoft Teams (Azure Bot posts here).
          httpSupport: true    # Set httpSupport:false for Slack-only deployments.
      envVariables:
        OPERANT_HOST: 0.0.0.0
        OPERANT_PORT: "8080"
        # Both processes share this container. The gateway binds all interfaces
        # (--bind lan → 0.0.0.0:18789), so loopback reaches it too. Use 127.0.0.1
        # (NOT the service hostname) on purpose: OpenClaw only skips device-pairing
        # for the backend gateway-client when it sees the connection as direct_local
        # (loopback) + the shared token. Connecting via the operant hostname makes it
        # look like a remote operator device and deadlocks on manual approval, so the
        # agent never reaches the gateway and the operant/pipedream tools never load.
        OPERANT_CONTROL_PLANE_URL: http://127.0.0.1:8080
        OPENCLAW_GATEWAY_URL: http://127.0.0.1:18789
        OPENCLAW_CONFIG_PATH: /operant/openclaw/openclaw.json   # written by CP, read by gateway — same disk
        OPENCLAW_STATE_DIR: /var/www/.openclaw-state
        OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"
        OPERANT_OPENCLAW_SANDBOX_MODE: docker
        # Remote Docker daemon on dockerhost over mutual TLS.
        DOCKER_HOST: tcp://dockerhost.zerops:2376
        DOCKER_TLS_VERIFY: "1"
        DOCKER_CERT_PATH: /var/www/.docker-certs
        DATABASE_URL: postgresql://${db_user}:${db_password}@${db_hostname}:${db_port}/${db_dbName}
      # Two named processes in parallel (mutually exclusive with `start`).
      startCommands:
        - name: controlplane
          command: node apps/control-plane/dist/src/server.js
        - name: gateway
          command: openclaw gateway run --allow-unconfigured --port 18789 --bind lan --auth token --verbose
      healthCheck:
        httpGet:
          port: 8080
          path: /healthz

  # ── Docker host: runs each agent tool call in an isolated sandbox container ─
  - setup: dockerhost
    build:
      base: alpine@3.21
      deployFiles:
        - dockerhost/~   # → /var/www/daemon.json
    run:
      base: docker@26.1.5
      initCommands:
        - sudo mkdir -p /etc/docker
        - sudo cp /var/www/daemon.json /etc/docker/daemon.json
        - sudo rc-service docker restart
      start: sleep infinity
